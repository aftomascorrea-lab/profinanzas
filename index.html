<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0F1523"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FinanzasPro"/>
<link rel="manifest" href="manifest.json"/>
<title>FinanzasPro</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Syne:wght@700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#0F1523;color:#EEF2FF;font-family:'Manrope',sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
input,select,button{font-family:'Manrope',sans-serif}
input:focus,select:focus{outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#3D4466;border-radius:4px}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fi{animation:fi .25s ease}
.sd{animation:sd .2s ease}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:rgba(21,27,42,.95);border-bottom:1px solid #2D3554;backdrop-filter:blur(20px)}
#header-inner{display:flex;justify-content:space-between;align-items:center;height:56px;padding:0 16px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4FC3F7,#1976D2);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px #4FC3F744}
.logo-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#EEF2FF;line-height:1}
.logo-sub{font-size:9px;color:#8892B0;margin-top:2px}
#nav-btn{display:flex;align-items:center;gap:7px;background:#1E2640;border:1px solid #2D3554;border-radius:20px;padding:6px 12px;cursor:pointer;color:#EEF2FF;font-size:13px;font-weight:600;transition:all .15s}
#nav-btn.open{background:#4FC3F722;border-color:#4FC3F755}
.nav-icon{font-size:14px}
.nav-chevron{font-size:12px;color:#8892B0;transition:transform .2s}
.nav-chevron.open{transform:rotate(180deg)}

/* DROPDOWN */
#dropdown{display:none;background:#151B2A;border-bottom:1px solid #2D3554;padding:12px 16px 16px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
#dropdown.open{display:block}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nav-item{display:flex;align-items:center;gap:9px;background:#1E2640;border:1px solid #2D3554;border-radius:12px;padding:10px 12px;cursor:pointer;color:#EEF2FF;font-size:13px;font-weight:600;width:100%;transition:all .15s}
.nav-item:hover,.nav-item.active{border-color:var(--c)55;background:var(--c)18}
.nav-item-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--c)22}
.nav-hint{text-align:center;margin-top:10px;font-size:10px;color:#8892B0}

/* CONTENT */
#content{padding:16px 16px 52px}

/* CARDS */
.card{background:#1E2640;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #2D3554}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#EEF2FF;margin-bottom:14px}

/* KPI */
.kpi-row{display:flex;gap:10px;margin-bottom:10px}
.kpi{background:#1E2640;border:1px solid #2D3554;border-radius:16px;padding:14px 16px;flex:1;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:-10px;right:-10px;width:60px;height:60px;border-radius:50%;background:var(--c)12}
.kpi-label{font-size:10px;color:#8892B0;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;color:var(--c)}
.kpi-sub{font-size:11px;color:#8892B0;margin-top:4px}

/* HERO */
.hero{background:linear-gradient(135deg,#1E2640,#252D47);border:1px solid #2D3554;border-radius:20px;padding:20px;margin-bottom:12px;text-align:center}
.hero-label{font-size:10px;color:#8892B0;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px}
.hero-val{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:600}
.hero-sub{font-size:12px;color:#8892B0;margin-top:4px}

/* BARS */
.bar-wrap{background:#252D47;border-radius:999px;overflow:hidden}
.bar-fill{border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}

/* SECTION HEADER */
.sec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600}
.sec-sub{font-size:12px;color:#8892B0;margin-top:3px}
.sec-icon-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sec-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#EEF2FF}

/* ITEMS */
.item{background:#1E2640;border:1px solid #2D3554;border-radius:14px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.item-name{font-size:14px;font-weight:700;color:#EEF2FF;margin-bottom:4px}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-right{display:flex;align-items:center;gap:10px}
.item-amount{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}

/* BUTTONS */
.add-btn{display:flex;align-items:center;gap:6px;border:none;border-radius:24px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0}
.del-btn{background:none;border:none;cursor:pointer;padding:4px;opacity:.6;font-size:16px}
.save-btn{width:100%;border:none;border-radius:14px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}

/* SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet{background:#151B2A;border-radius:24px 24px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid #2D3554}
.sheet-handle{width:40px;height:4px;background:#2D3554;border-radius:999px;margin:0 auto 20px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sheet-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#EEF2FF}
.close-btn{background:#252D47;border:none;border-radius:10px;padding:6px 10px;cursor:pointer;color:#8892B0;font-size:16px}
.field{margin-bottom:12px}
.field-label{font-size:11px;color:#8892B0;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:10px 12px;background:#252D47;border:1px solid #2D3554;border-radius:10px;color:#EEF2FF;font-size:14px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}

/* SEMAFORO */
.sem{display:flex;align-items:center;gap:6px}
.sem-dot{width:8px;height:8px;border-radius:50%}
.sem-label{font-size:12px;font-weight:600}

/* SCORE */
.score-wrap{display:flex;gap:12px;margin-top:14px}
.score-item{flex:1;text-align:center}
.score-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}
.score-lbl{font-size:10px;color:#8892B0;margin-top:2px}

/* SUGGESTION */
.suggestion{background:#252D47;border-radius:12px;padding:12px;margin-top:4px}
.sug-title{font-size:10px;color:#8892B0;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sug-text{font-size:12px;color:#EEF2FF;line-height:1.6}

/* PROGRESS ITEM */
.prog-item{margin-bottom:14px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-name{font-size:13px;color:#EEF2FF}
.prog-pct{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.prog-footer{display:flex;justify-content:space-between;margin-top:3px}
.prog-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8892B0}

/* DEBT CARD */
.debt-card{background:#1E2640;border:1px solid #2D3554;border-radius:16px;padding:16px;margin-bottom:10px}
.stat-row{display:flex;gap:8px;margin-top:10px}
.stat-box{flex:1;background:#252D47;border-radius:10px;padding:8px 10px;text-align:center}
.stat-lbl{font-size:10px;color:#8892B0;margin-bottom:2px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}

/* CALC */
.scenario{background:#252D47;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.scenario-info .name{font-size:13px;font-weight:600;color:#EEF2FF}
.scenario-info .sub{font-size:11px;color:#8892B0}
.scenario-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600}
.scenario-sub{font-size:11px;color:#8892B0;text-align:right}

/* PIE LEGEND */
.pie-legend-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pie-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.pie-name{font-size:12px;color:#EEF2FF}
.pie-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.pie-amount{font-size:10px;color:#8892B0}

/* INDICATOR ROW */
.ind-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #2D3554}
.ind-label{font-size:13px;color:#8892B0}

/* CHART CONTAINER */
.chart-wrap{position:relative;width:100%;height:160px;margin-top:8px}
.pie-wrap{display:flex;gap:12px;align-items:center}
.pie-canvas-wrap{width:130px;height:130px;flex-shrink:0}
.pie-legend{flex:1}
.pie-total-label{font-size:11px;color:#8892B0;margin-top:8px;padding-top:8px;border-top:1px solid #2D3554}
.pie-total-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:#4FC3F7}

/* META UPDATE */
.meta-update{display:flex;gap:8px;align-items:center;margin-top:8px}
.meta-update span{font-size:11px;color:#8892B0;flex-shrink:0}
.meta-update input{flex:1;padding:7px 10px;background:#252D47;border:1px solid #2D3554;border-radius:8px;color:#EEF2FF;font-size:13px}

/* UTIL BAR CONTAINER */
.util-header{display:flex;justify-content:space-between;margin-bottom:6px}
.tc-stats{display:flex;gap:8px;margin-top:10px}
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div class="logo-wrap">
      <div class="logo-icon">💼</div>
      <div>
        <div class="logo-title">FinanzasPro</div>
        <div class="logo-sub">Gestión Financiera</div>
      </div>
    </div>
    <button id="nav-btn" onclick="toggleMenu()">
      <span class="nav-icon" id="nav-icon">🏠</span>
      <span id="nav-label">Dashboard</span>
      <span class="nav-chevron" id="nav-chevron">▾</span>
    </button>
  </div>
  <div id="dropdown">
    <div class="nav-grid" id="nav-grid"></div>
    <div class="nav-hint">💾 Datos guardados automáticamente</div>
  </div>
</div>

<div id="content"></div>

<!-- SHEET -->
<div class="sheet-overlay" id="sheet">
  <div class="sheet sd">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheet-title"></span>
      <button class="close-btn" onclick="closeSheet()">✕</button>
    </div>
    <div id="sheet-body"></div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const dStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const INIT={
  ingresos:[
    {id:1,fecha:dStr(cy,cm-2,15),fuente:'Salario Empresa',tipo:'Activo',monto:35000},
    {id:2,fecha:dStr(cy,cm-2,25),fuente:'Freelance',tipo:'Activo',monto:8000},
    {id:3,fecha:dStr(cy,cm-1,15),fuente:'Salario Empresa',tipo:'Activo',monto:35000},
    {id:4,fecha:dStr(cy,cm-1,20),fuente:'Renta Depto',tipo:'Pasivo',monto:5000},
    {id:5,fecha:dStr(cy,cm,15),fuente:'Salario Empresa',tipo:'Activo',monto:37000},
    {id:6,fecha:dStr(cy,cm,18),fuente:'Dividendos ETFs',tipo:'Pasivo',monto:2400},
  ],
  gastos:[
    {id:1,fecha:dStr(cy,cm-2,1),categoria:'Vivienda',desc:'Renta mensual',monto:12000},
    {id:2,fecha:dStr(cy,cm-2,5),categoria:'Alimentacion',desc:'Supermercado',monto:3200},
    {id:3,fecha:dStr(cy,cm-2,10),categoria:'Transporte',desc:'Gasolina',monto:1800},
    {id:4,fecha:dStr(cy,cm-1,1),categoria:'Vivienda',desc:'Renta mensual',monto:12000},
    {id:5,fecha:dStr(cy,cm-1,5),categoria:'Alimentacion',desc:'Supermercado',monto:2900},
    {id:6,fecha:dStr(cy,cm-1,12),categoria:'Ocio',desc:'Restaurantes',monto:2500},
    {id:7,fecha:dStr(cy,cm,1),categoria:'Vivienda',desc:'Renta mensual',monto:12000},
    {id:8,fecha:dStr(cy,cm,5),categoria:'Alimentacion',desc:'Supermercado',monto:3500},
    {id:9,fecha:dStr(cy,cm,10),categoria:'Transporte',desc:'Gasolina',monto:1700},
    {id:10,fecha:dStr(cy,cm,14),categoria:'Salud',desc:'Medico',monto:1200},
  ],
  inversiones:[
    {id:1,tipo:'ETF',nombre:'VOO S&P500',capital:85000,valorActual:102500,riesgo:'Bajo'},
    {id:2,tipo:'ETF',nombre:'QQQ Nasdaq',capital:42000,valorActual:51800,riesgo:'Medio'},
    {id:3,tipo:'Accion',nombre:'AAPL Apple',capital:18000,valorActual:21500,riesgo:'Medio'},
    {id:4,tipo:'Accion',nombre:'MSFT Microsoft',capital:15000,valorActual:19200,riesgo:'Medio'},
    {id:5,tipo:'Crypto',nombre:'Bitcoin BTC',capital:10000,valorActual:14300,riesgo:'Muy Alto'},
    {id:6,tipo:'CETES',nombre:'CETES 28 dias',capital:50000,valorActual:52500,riesgo:'Bajo'},
    {id:7,tipo:'Inmueble',nombre:'FIBRA Uno',capital:30000,valorActual:28500,riesgo:'Medio'},
  ],
  tarjetas:[
    {id:1,banco:'Banamex VISA',limite:60000,saldo:18500,tasaAnual:24,diaCorte:20,diaPago:5},
    {id:2,banco:'BBVA MC Azul',limite:40000,saldo:32000,tasaAnual:28.8,diaCorte:10,diaPago:25},
    {id:3,banco:'Santander VISA',limite:80000,saldo:5200,tasaAnual:21.6,diaCorte:15,diaPago:30},
  ],
  deudas:[
    {id:1,tipo:'Auto',acreedor:'Nissan Financial',montoOrig:250000,saldo:185000,tasaAnual:9.5,pagoMens:4200},
    {id:2,tipo:'Personal',acreedor:'HSBC',montoOrig:80000,saldo:62000,tasaAnual:18,pagoMens:3500},
    {id:3,tipo:'Estudiantil',acreedor:'BBVA',montoOrig:120000,saldo:95000,tasaAnual:7,pagoMens:2800},
  ],
  metas:[
    {id:1,nombre:'Fondo Emergencia',objetivo:150000,actual:45000,fechaObj:`${cy}-12-31`,prioridad:'Alta'},
    {id:2,nombre:'Viaje Europa',objetivo:80000,actual:15000,fechaObj:`${cy+1}-06-30`,prioridad:'Media'},
    {id:3,nombre:'Auto Nuevo',objetivo:300000,actual:80000,fechaObj:`${cy+2}-01-31`,prioridad:'Media'},
    {id:4,nombre:'Enganche Casa',objetivo:600000,actual:50000,fechaObj:`${cy+3}-12-31`,prioridad:'Alta'},
  ],
};

let DATA=INIT;
try{const s=localStorage.getItem('fp_v5');if(s)DATA=JSON.parse(s);}catch(e){}

function save(){try{localStorage.setItem('fp_v5',JSON.stringify(DATA));}catch(e){}}

// ─── HELPERS ──────────────────────────────────────────────────────────────
const fmtK=n=>{const v=n||0;if(Math.abs(v)>=1e6)return`$${(v/1e6).toFixed(1)}M`;if(Math.abs(v)>=1e3)return`$${(v/1e3).toFixed(0)}K`;return`$${Math.round(v).toLocaleString()}`};
const pct=v=>`${((v||0)*100).toFixed(1)}%`;
const getYM=d=>{const dt=new Date(d+'T12:00:00');return{y:dt.getFullYear(),m:dt.getMonth()}};
const calcNPER=(r,pmt,pv)=>{const rm=r/12;if(!rm||pmt<=0||pv<=0)return 0;if(pmt<=rm*pv)return 999;try{return Math.max(0,Math.ceil(Math.log(pmt/(pmt-rm*pv))/Math.log(1+rm)))}catch{return 999}};
const calcPMT=(goal,cur,months,r)=>{if(months<=0)return 0;const rm=r/12;if(!rm)return Math.max(0,(goal-cur)/months);const f=Math.pow(1+rm,months);return Math.max(0,(goal-cur*f)*rm/(f-1))};

const PCOLS=['#4FC3F7','#4CAF82','#F05365','#FF9A3C','#9B7FEA','#FFD166','#26C6DA','#EC407A'];
const CAT_C={Vivienda:'#4FC3F7',Alimentacion:'#4CAF82',Transporte:'#FF9A3C',Salud:'#9B7FEA',Educacion:'#26C6DA',Ocio:'#FFD166',Ropa:'#EC407A',Tecnologia:'#42A5F5',Servicios:'#8892B0',Otros:'#5A647E'};
const TIPO_C={Activo:'#4CAF82',Pasivo:'#4FC3F7','Semi-Pasivo':'#26C6DA',Extra:'#FFD166'};
const RIESGO_C={Bajo:'#4CAF82',Medio:'#FF9A3C',Alto:'#F05365','Muy Alto':'#F05365'};
const PRIO_C={Alta:'#F05365',Media:'#FF9A3C',Baja:'#4FC3F7'};

const badge=(text,color)=>`<span class="badge" style="background:${color}20;color:${color}">${text}</span>`;
const barProgress=(val,max,color,height=6)=>`<div class="bar-wrap" style="height:${height}px"><div class="bar-fill" style="width:${Math.min(100,(val/(max||1))*100)}%;height:100%;background:${color}"></div></div>`;
const sem=(val,low,high,inv=false,labels=['Riesgo','Cuidado','Saludable'])=>{
  let color,label;
  if(!inv){if(val>=high){color='#4CAF82';label=labels[2]}else if(val>=low){color='#FF9A3C';label=labels[1]}else{color='#F05365';label=labels[0]}}
  else{if(val<=low){color='#4CAF82';label=labels[2]}else if(val<=high){color='#FF9A3C';label=labels[1]}else{color='#F05365';label=labels[0]}}
  return`<div class="sem"><div class="sem-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div><span class="sem-label" style="color:${color}">${label}</span></div>`;
};

// ─── NAV ──────────────────────────────────────────────────────────────────
const SECTIONS=[
  {id:'dashboard',label:'Dashboard',icon:'🏠',color:'#4FC3F7'},
  {id:'ingresos',label:'Ingresos',icon:'📈',color:'#4CAF82'},
  {id:'gastos',label:'Gastos',icon:'💸',color:'#F05365'},
  {id:'inversiones',label:'Inversiones',icon:'📊',color:'#4FC3F7'},
  {id:'tarjetas',label:'Tarjetas',icon:'💳',color:'#FF9A3C'},
  {id:'deudas',label:'Deudas',icon:'💰',color:'#F05365'},
  {id:'metas',label:'Metas',icon:'🎯',color:'#4CAF82'},
  {id:'calculadora',label:'Calculadora',icon:'🧮',color:'#9B7FEA'},
];

let currentSection='dashboard';
let charts={};

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

function initNav(){
  const grid=document.getElementById('nav-grid');
  grid.innerHTML=SECTIONS.map(s=>`
    <button class="nav-item ${s.id===currentSection?'active':''}" style="--c:${s.color}" onclick="navigate('${s.id}')">
      <div class="nav-item-icon">${s.icon}</div>${s.label}
    </button>`).join('');
}

function toggleMenu(){
  const dd=document.getElementById('dropdown');
  const btn=document.getElementById('nav-btn');
  const chev=document.getElementById('nav-chevron');
  const isOpen=dd.classList.contains('open');
  dd.classList.toggle('open',!isOpen);
  btn.classList.toggle('open',!isOpen);
  chev.classList.toggle('open',!isOpen);
}

function navigate(id){
  currentSection=id;
  const s=SECTIONS.find(x=>x.id===id);
  document.getElementById('nav-icon').textContent=s.icon;
  document.getElementById('nav-label').textContent=s.label;
  document.getElementById('dropdown').classList.remove('open');
  document.getElementById('nav-btn').classList.remove('open');
  document.getElementById('nav-chevron').classList.remove('open');
  initNav();
  render();
}

// ─── SHEET ────────────────────────────────────────────────────────────────
function openSheet(title,bodyHtml){
  document.getElementById('sheet-title').textContent=title;
  document.getElementById('sheet-body').innerHTML=bodyHtml;
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');}

// ─── RENDER ───────────────────────────────────────────────────────────────
function render(){
  destroyCharts();
  const el=document.getElementById('content');
  el.className='fi';
  el.innerHTML='';

  const s=SECTIONS.find(x=>x.id===currentSection);
  let html='';

  if(currentSection!=='dashboard'){
    html+=`<div class="sec-icon-wrap">
      <div class="sec-icon" style="background:${s.color}20">${s.icon}</div>
      <div class="sec-name">${s.label}</div>
    </div>`;
  }

  switch(currentSection){
    case 'dashboard':   html+=renderDashboard();break;
    case 'ingresos':    html+=renderIngresos();break;
    case 'gastos':      html+=renderGastos();break;
    case 'inversiones': html+=renderInversiones();break;
    case 'tarjetas':    html+=renderTarjetas();break;
    case 'deudas':      html+=renderDeudas();break;
    case 'metas':       html+=renderMetas();break;
    case 'calculadora': html+=renderCalc();break;
  }

  el.innerHTML=html;
  setTimeout(()=>initCharts(),50);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
function renderDashboard(){
  const y=cy,m=cm;

      <div class="kpi-val">${fmtK(gasMes)}</div>
      <div class="kpi-sub">${mesG.length} transacciones</div>
    </div>

  <div class="kpi-row">

    </div>

      <div class="kpi-label">Deuda Total</div>
      <div class="kpi-val">${fmtK(totD)}</div>

  <div class="card">

      <div class="score-item"><div class="score-val" style="color:${ratioD<=.3?'#4CAF82':ratioD<=.5?'#FF9A3C':'#F05365'}">${pct(ratioD)}</div><div class="score-lbl">Deuda/Ing.</div></div>

  ${DATA.metas.map(meta=>{
    const p=Math.min(1,meta.actual/meta.objetivo);
    const col=p>=1?'#4FC3F7':p>=.75?'#4CAF82':p>=.4?'#FF9A3C':'#F05365';
    const mR=meta.fechaObj?Math.max(0,Math.round((new Date(meta.fechaObj)-new Date())/(1000*60*60*24*30))):null;
    const aM=mR&&mR>0?(meta.objetivo-meta.actual)/mR:null;
    return`<div class="debt-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#EEF2FF">${meta.nombre}</div>
        <div style="margin-top:5px">${badge(meta.prioridad,PRIO_C[meta.prioridad]||'#8892B0')}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:${col}">${pct(p)}</span>
          <button class="del-btn" onclick="delMeta(${meta.id})">🗑</button>
        </div>
      </div>
      ${barProgress(p,1,col,8)}
      <div style="display:flex;justify-content:space-between;margin:5px 0 12px">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#8892B0">${fmtK(meta.actual)}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${col}">${fmtK(meta.objetivo)}</span>
      </div>
      <div class="stat-row" style="margin-bottom:12px">
        ${mR!==null?`<div class="stat-box"><div class="stat-lbl">Meses rest.</div><div class="stat-val" style="color:#4FC3F7">${mR}</div></div>`:''}
        ${aM?`<div class="stat-box"><div class="stat-lbl">Ahorro/mes</div><div class="stat-val" style="color:#4CAF82">${fmtK(aM)}</div></div>`:''}
      </div>
      <div class="meta-update">
        <span>Actualizar:</span>
        <input type="number" value="${meta.actual}" onchange="updMeta(${meta.id},this.value)"/>
      </div>
    </div>`;}).join('')}`;
}

// ─── CALCULADORA ──────────────────────────────────────────────────────────
function renderCalc(){
  const meta=window._calcMeta||200000;
  const actual=window._calcActual||20000;
  const meses=window._calcMeses||36;
  const tasa=window._calcTasa||8;
  const r=tasa/100;
  const aport=calcPMT(meta,actual,meses,r);
  const aOpt=calcPMT(meta,actual,meses,r+.04);
  const aCons=calcPMT(meta,actual,meses,Math.max(0,r-.03));
  const proj=[];let s=actual;const rm=r/12;
  for(let i=1;i<=meses;i++){s=s*(1+rm)+aport;if(i%(Math.ceil(meses/7))===0||i===meses)proj.push({mes:`M${i}`,val:Math.round(s)});}
  window._calcProj=proj;window._calcMeta2=meta;
  return `
  <div class="card">
    <div class="card-title">📥 Parametros</div>
    <div class="field"><div class="field-label">Meta financiera ($)</div><input type="number" value="${meta}" onchange="updateCalc('meta',this.value)"/></div>
    <div class="field"><div class="field-label">Ahorro actual ($)</div><input type="number" value="${actual}" onchange="updateCalc('actual',this.value)"/></div>
    <div class="field-row">
      <div class="field"><div class="field-label">Plazo (meses)</div><input type="number" value="${meses}" onchange="updateCalc('meses',this.value)"/></div>
      <div class="field"><div class="field-label">Rendto. anual (%)</div><input type="number" value="${tasa}" onchange="updateCalc('tasa',this.value)"/></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 Escenarios</div>
    <div class="scenario"><div class="scenario-info"><div class="name">Optimista</div><div class="sub">${tasa+4}% rendimiento</div></div><div><div class="scenario-val" style="color:#4CAF82">${fmtK(aOpt)}</div><div class="scenario-sub">/mes</div></div></div>
    <div class="scenario"><div class="scenario-info"><div class="name">Base</div><div class="sub">${tasa}% rendimiento</div></div><div><div class="scenario-val" style="color:#4FC3F7">${fmtK(aport)}</div><div class="scenario-sub">/mes</div></div></div>
    <div class="scenario"><div class="scenario-info"><div class="name">Conservador</div><div class="sub">${Math.max(0,tasa-3)}% rendimiento</div></div><div><div class="scenario-val" style="color:#FF9A3C">${fmtK(aCons)}</div><div class="scenario-sub">/mes</div></div></div>
    <div class="scenario" style="margin-top:4px">
      <div><div style="font-size:11px;color:#8892B0">Total aportado</div><span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#EEF2FF">${fmtK(aport*meses+actual)}</span></div>
      <div style="text-align:right"><div style="font-size:11px;color:#8892B0">Intereses ganados</div><span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#4CAF82">${fmtK(Math.max(0,meta-(aport*meses+actual)))}</span></div>
    </div>
  </div>
  ${proj.length>0?`<div class="card"><div class="card-title">📈 Proyeccion</div><div style="font-size:11px;color:#8892B0;margin-bottom:8px">Meta: <span style="color:#9B7FEA;font-weight:600">${fmtK(meta)}</span> · Aporte base: <span style="color:#4FC3F7;font-weight:600">${fmtK(aport)}/mes</span></div><div class="chart-wrap"><canvas id="calcChart"></canvas></div></div>`:''}`;
}

function updateCalc(field,val){
  window._calcMeta=window._calcMeta||200000;
  window._calcActual=window._calcActual||20000;
  window._calcMeses=window._calcMeses||36;
  window._calcTasa=window._calcTasa||8;
  if(field==='meta')window._calcMeta=parseFloat(val)||0;
  if(field==='actual')window._calcActual=parseFloat(val)||0;
  if(field==='meses')window._calcMeses=parseInt(val)||1;
  if(field==='tasa')window._calcTasa=parseFloat(val)||0;
  render();
}

// ─── CHARTS ───────────────────────────────────────────────────────────────
function initCharts(){
  if(currentSection==='dashboard'){
    // Bar chart
    const bCtx=document.getElementById('barChart');
    if(bCtx&&window._barData){
      charts.bar=new Chart(bCtx,{type:'bar',data:{labels:window._barData.map(d=>d.label),datasets:[{label:'Ingresos',data:window._barData.map(d=>d.ing),backgroundColor:'#4CAF8299',borderColor:'#4CAF82',borderWidth:1,borderRadius:5},{label:'Gastos',data:window._barData.map(d=>d.gas),backgroundColor:'#F0536599',borderColor:'#F05365',borderWidth:1,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892B0',font:{size:11}}}},scales:{x:{ticks:{color:'#8892B0',font:{size:11}},grid:{color:'#2D3554'}},y:{ticks:{color:'#8892B0',font:{size:10},callback:v=>`${(v/1000).toFixed(0)}K`},grid:{color:'#2D3554'}}}}});
    }
    // Pie chart
    const pCtx=document.getElementById('pieChart');
    if(pCtx&&window._pieData&&window._pieData.length>0){
      charts.pie=new Chart(pCtx,{type:'doughnut',data:{labels:window._pieData.map(d=>d[0]),datasets:[{data:window._pieData.map(d=>d[1]),backgroundColor:PCOLS.slice(0,window._pieData.length),borderColor:'#1E2640',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{display:false}}}});
    }
  }
  if(currentSection==='inversiones'){
    const pCtx=document.getElementById('pieChartInv');
    if(pCtx&&window._pieInvData&&window._pieInvData.length>0){
      charts.pieInv=new Chart(pCtx,{type:'doughnut',data:{labels:window._pieInvData.map(d=>d[0]),datasets:[{data:window._pieInvData.map(d=>d[1]),backgroundColor:PCOLS.slice(0,window._pieInvData.length),borderColor:'#1E2640',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{display:false}}}});
    }
  }
  if(currentSection==='calculadora'){
    const cCtx=document.getElementById('calcChart');
    if(cCtx&&window._calcProj&&window._calcProj.length>0){
      const metaLine=window._calcProj.map(()=>window._calcMeta2||200000);
      charts.calc=new Chart(cCtx,{type:'line',data:{labels:window._calcProj.map(d=>d.mes),datasets:[{label:'Saldo',data:window._calcProj.map(d=>d.val),borderColor:'#9B7FEA',backgroundColor:'#9B7FEA22',fill:true,tension:.4,pointBackgroundColor:'#9B7FEA',pointRadius:4},{label:'Meta',data:metaLine,borderColor:'#FFD166',borderDash:[5,4],fill:false,pointRadius:0,tension:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892B0',font:{size:11}}}},scales:{x:{ticks:{color:'#8892B0',font:{size:11}},grid:{color:'#2D3554'}},y:{ticks:{color:'#8892B0',font:{size:10},callback:v=>fmtK(v)},grid:{color:'#2D3554'}}}}});
    }
  }
}
