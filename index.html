<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0F1523"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Correa Patrimonial"/>
<link rel="manifest" href="manifest.json"/>
<title>Correa — Asesoría Patrimonial</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Syne:wght@700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#0F1523;color:#EEF2FF;font-family:"Manrope",sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
input,select,button{font-family:"Manrope",sans-serif}
input:focus,select:focus{outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#3D4466;border-radius:4px}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fi .25s ease}.sd{animation:sd .2s ease}.pulse{animation:pulse 2s infinite}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.97);border-bottom:2px solid #B8963E44;backdrop-filter:blur(20px)}
#header-inner{display:flex;justify-content:space-between;align-items:center;height:60px;padding:0 14px}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-img{height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 6px #B8963E44)}
.logo-texts{display:flex;flex-direction:column;justify-content:center}
.logo-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:800;color:#EEF2FF;line-height:1;letter-spacing:.5px}
.logo-sub{font-size:8px;color:#B8963E;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
#nav-btn{display:flex;align-items:center;gap:7px;background:#1A2035;border:1px solid #2D3554;border-radius:20px;padding:6px 12px;cursor:pointer;color:#EEF2FF;font-size:13px;font-weight:600;transition:all .15s;flex-shrink:0}
#nav-btn.open{background:#B8963E22;border-color:#B8963E66}
.nav-chevron{font-size:12px;color:#8892B0;transition:transform .2s}.nav-chevron.open{transform:rotate(180deg)}

/* ALERT BANNER */
#alert-banner{display:none;background:#1A1200;border-bottom:2px solid #FF9A3C66}
#alert-banner.show{display:block}
.alert-inner{padding:8px 16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.alert-dot{width:8px;height:8px;border-radius:50%;background:#FF9A3C;flex-shrink:0}
.alert-text{font-size:12px;color:#FF9A3C;font-weight:700;flex:1}
.alert-count{background:#FF9A3C;color:#0F1523;border-radius:99px;padding:1px 8px;font-size:11px;font-weight:800}

/* DROPDOWN */
#dropdown{display:none;background:#0D1120;border-bottom:2px solid #B8963E33;padding:12px 16px 16px;box-shadow:0 16px 48px rgba(0,0,0,.7)}
#dropdown.open{display:block}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nav-item{display:flex;align-items:center;gap:9px;background:#1A2035;border:1px solid #2D3554;border-radius:12px;padding:10px 12px;cursor:pointer;color:#EEF2FF;font-size:13px;font-weight:600;width:100%;transition:all .15s}
.nav-item.active{border-color:var(--c)66;background:var(--c)18;color:var(--c)}
.nav-item-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--c)22}
.nav-hint{text-align:center;margin-top:10px;font-size:10px;color:#8892B0}

/* CONTENT */
#content{padding:16px 16px 52px}
.card{background:#1A2035;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #252D47}
.card-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:#EEF2FF;margin-bottom:14px}
.kpi-row{display:flex;gap:10px;margin-bottom:10px}
.kpi{background:#1A2035;border:1px solid #252D47;border-radius:16px;padding:14px 16px;flex:1;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;top:-10px;right:-10px;width:60px;height:60px;border-radius:50%;background:var(--c)12}
.kpi-label{font-size:10px;color:#8892B0;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.kpi-val{font-family:"JetBrains Mono",monospace;font-size:17px;font-weight:600;color:var(--c)}
.kpi-sub{font-size:11px;color:#8892B0;margin-top:4px}
.hero{background:linear-gradient(135deg,#1A2035 0%,#0D1628 100%);border:1px solid #B8963E33;border-radius:20px;padding:20px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top,#B8963E08,transparent 60%)}
.hero-label{font-size:10px;color:#8892B0;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px}
.hero-val{font-family:"JetBrains Mono",monospace;font-size:36px;font-weight:600}
.hero-sub{font-size:12px;color:#8892B0;margin-top:4px}
.bar-wrap{background:#252D47;border-radius:999px;overflow:hidden}
.bar-fill{border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.sec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sec-title{font-family:"JetBrains Mono",monospace;font-size:26px;font-weight:600}
.sec-sub{font-size:12px;color:#8892B0;margin-top:3px}
.sec-icon-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sec-name{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:#EEF2FF}
.item{background:#1A2035;border:1px solid #252D47;border-radius:14px;padding:12px 16px;margin-bottom:8px}
.item-row{display:flex;justify-content:space-between;align-items:center}
.item-name{font-size:14px;font-weight:700;color:#EEF2FF;margin-bottom:4px}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.item-amount{font-family:"JetBrains Mono",monospace;font-size:15px;font-weight:600}
.add-btn{display:flex;align-items:center;gap:6px;border:none;border-radius:24px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0}
.del-btn{background:none;border:none;cursor:pointer;padding:4px;opacity:.55;font-size:16px;flex-shrink:0}
.save-btn{width:100%;border:none;border-radius:14px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet{background:#0D1120;border-radius:24px 24px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid #252D47;border-bottom:none}
.sheet-handle{width:40px;height:4px;background:#252D47;border-radius:999px;margin:0 auto 20px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sheet-title{font-family:"Syne",sans-serif;font-size:17px;font-weight:700;color:#EEF2FF}
.close-btn{background:#1A2035;border:none;border-radius:10px;padding:6px 10px;cursor:pointer;color:#8892B0;font-size:16px}
.field{margin-bottom:12px}
.field-label{font-size:11px;color:#8892B0;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block}
.field input,.field select{width:100%;padding:10px 12px;background:#1A2035;border:1px solid #252D47;border-radius:10px;color:#EEF2FF;font-size:14px}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
.divider{border:none;border-top:1px solid #252D47;margin:14px 0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:#1A2035;border:1px solid #252D47;border-radius:10px;padding:10px 12px;margin-bottom:12px;cursor:pointer}
.toggle-label{font-size:13px;color:#EEF2FF;font-weight:600}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#252D47;border-radius:99px;transition:.3s}
.toggle-slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#8892B0;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:#B8963E}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);background:#fff}
.meses-opts{display:none;margin-bottom:12px}.meses-opts.show{display:block}
.meses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.meses-btn{border:1px solid #252D47;background:#1A2035;color:#8892B0;border-radius:8px;padding:10px 4px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.meses-btn.sel{background:#B8963E22;border-color:#B8963E;color:#B8963E}
.stat-row{display:flex;gap:8px;margin-top:10px}
.stat-box{flex:1;background:#252D47;border-radius:10px;padding:8px 10px;text-align:center}
.stat-lbl{font-size:10px;color:#8892B0;margin-bottom:2px}
.stat-val{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:600}
.debt-card{background:#1A2035;border:1px solid #252D47;border-radius:16px;padding:16px;margin-bottom:10px}
.prog-item{margin-bottom:14px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-name{font-size:13px;color:#EEF2FF}
.prog-pct{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600}
.prog-footer{display:flex;justify-content:space-between;margin-top:3px}
.prog-num{font-family:"JetBrains Mono",monospace;font-size:10px;color:#8892B0}
.ind-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #252D47}
.ind-label{font-size:13px;color:#8892B0}
.sem{display:flex;align-items:center;gap:6px}
.sem-dot{width:8px;height:8px;border-radius:50%}
.sem-label{font-size:12px;font-weight:600}
.suggestion{background:#252D47;border-radius:12px;padding:12px;margin-top:8px}
.sug-title{font-size:10px;color:#B8963E;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sug-text{font-size:12px;color:#EEF2FF;line-height:1.6}
.chart-wrap{position:relative;width:100%;height:160px;margin-top:8px}
.pie-wrap{display:flex;gap:12px;align-items:center}
.pie-canvas-wrap{width:130px;height:130px;flex-shrink:0}
.pie-legend{flex:1}
.pie-legend-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pie-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.pie-name{font-size:12px;color:#EEF2FF}
.pie-pct{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:600}
.pie-amount{font-size:10px;color:#8892B0}
.pie-total-label{font-size:11px;color:#8892B0;margin-top:8px;padding-top:8px;border-top:1px solid #252D47}
.pie-total-val{font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:600;color:#B8963E}
.meta-update{display:flex;gap:8px;align-items:center;margin-top:8px}
.meta-update span{font-size:11px;color:#8892B0;flex-shrink:0}
.meta-update input{flex:1;padding:7px 10px;background:#252D47;border:1px solid #2D3554;border-radius:8px;color:#EEF2FF;font-size:13px}
.scenario{background:#252D47;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.scenario-val{font-family:"JetBrains Mono",monospace;font-size:20px;font-weight:600}
.score-wrap{display:flex;gap:12px;margin-top:14px}
.score-item{flex:1;text-align:center}
.score-val{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:600}
.score-lbl{font-size:10px;color:#8892B0;margin-top:2px}
/* MONTH SELECTOR */
.month-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-pill{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid #252D47;background:#1A2035;color:#8892B0;cursor:pointer;transition:all .15s;white-space:nowrap}
.month-pill.active{background:#F0536522;border-color:#F05365;color:#F05365}
/* MSI */
.msi-tag{background:#B8963E18;color:#B8963E;border:1px solid #B8963E44;border-radius:8px;padding:4px 8px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px;margin-top:6px;width:fit-content}
/* ALERT MODAL */
.alert-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:center;justify-content:center;padding:20px}
.alert-modal.open{display:flex}
.alert-box{background:#1A2035;border:1px solid #FF9A3C44;border-radius:20px;padding:20px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto}
.alert-box-title{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;color:#FF9A3C;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.alert-item{background:#252D47;border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--ac)}
.alert-item-title{font-size:13px;font-weight:700;color:#EEF2FF;margin-bottom:4px}
.alert-item-body{font-size:12px;color:#8892B0;line-height:1.5}
/* GOLD ACCENTS */
.gold{color:#B8963E}
.gold-border{border-color:#B8963E44!important}
</style>
</head>

const fmtK=n=>{const v=n||0;if(Math.abs(v)>=1e6)return`$${(v/1e6).toFixed(1)}M`;if(Math.abs(v)>=1e3)return`$${(v/1e3).toFixed(0)}K`;return`$${Math.round(v).toLocaleString()}`};
const pct=v=>`${((v||0)*100).toFixed(1)}%`;
const getYM=d=>{const dt=new Date(d+"T12:00:00");return{y:dt.getFullYear(),m:dt.getMonth()}};
const calcNPER=(r,pmt,pv)=>{const rm=r/12;if(!rm||pmt<=0||pv<=0)return 0;if(pmt<=rm*pv)return 999;try{return Math.max(0,Math.ceil(Math.log(pmt/(pmt-rm*pv))/Math.log(1+rm)))}catch{return 999}};
const calcPMT=(goal,cur,months,r)=>{if(months<=0)return 0;const rm=r/12;if(!rm)return Math.max(0,(goal-cur)/months);const f=Math.pow(1+rm,months);return Math.max(0,(goal-cur*f)*rm/(f-1))};

const sem=(val,low,high,inv=false,labels=["Riesgo","Cuidado","Saludable"])=>{

function getAlerts(){

  });

    const tc=DATA.tarjetas.find(t=>t.id===g.tarjetaId);

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  destroyCharts();
  const el=document.getElementById("content");
  el.className="fi";
  const s=SECTIONS.find(x=>x.id===currentSection);
  let html="";
  if(currentSection!=="dashboard"){html+=`<div class="sec-icon-wrap"><div class="sec-icon" style="background:${s.color}20">${s.icon}</div><div class="sec-name">${s.label}</div></div>`;}
  switch(currentSection){
    case"dashboard":html+=renderDashboard();break;
    case"ingresos":html+=renderIngresos();break;
    case"gastos":html+=renderGastos();break;
    case"inversiones":html+=renderInversiones();break;
    case"tarjetas":html+=renderTarjetas();break;
    case"deudas":html+=renderDeudas();break;
    case"metas":html+=renderMetas();break;
    case"calculadora":html+=renderCalc();break;
  }
  el.innerHTML=html;
  updateAlertBanner();
  setTimeout(()=>initCharts(),60);
}

  </div>
  <div class="kpi-row">
    <div class="kpi" style="--c:#4CAF82"><div class="kpi-label">Ingresos</div><div class="kpi-val">${fmtK(ingMes)}</div><div class="kpi-sub">${mesI.length} fuentes</div></div>
    <div class="kpi" style="--c:#F05365"><div class="kpi-label">Gastos</div><div class="kpi-val">${fmtK(gasMes)}</div><div class="kpi-sub">${mesG.length} movimientos</div></div>
  </div>
  <div class="kpi-row">
    <div class="kpi" style="--c:#4FC3F7"><div class="kpi-label">Portafolio</div><div class="kpi-val">${fmtK(totalP)}</div><div class="kpi-sub" style="color:${rend>=0?"#4CAF82":"#F05365"}">${rend>=0?"+":""}${fmtK(rend)}</div></div>
    <div class="kpi" style="--c:#FF9A3C"><div class="kpi-label">Deuda Total</div><div class="kpi-val">${fmtK(totD)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

// ── CALCULADORA ────────────────────────────────────────────────────────────
function renderCalc(){
  const meta=window._cM||200000,actual=window._cA||20000,meses=window._cMs||36,tasa=window._cT||8;
  const r=tasa/100,aport=calcPMT(meta,actual,meses,r),aOpt=calcPMT(meta,actual,meses,r+.04),aCons=calcPMT(meta,actual,meses,Math.max(0,r-.03));
  const proj=[];let s=actual;const rm=r/12;for(let i=1;i<=meses;i++){s=s*(1+rm)+aport;if(i%(Math.ceil(meses/7))===0||i===meses)proj.push({mes:`M${i}`,val:Math.round(s)});}
  window._calcProj=proj;window._calcMeta2=meta;
  return`
  <div class="card"><div class="card-title">📥 Parámetros</div>
    <div class="field"><label class="field-label">Meta financiera ($)</label><input type="number" value="${meta}" onchange="window._cM=parseFloat(this.value)||0;render()"/></div>
    <div class="field"><label class="field-label">Ahorro actual ($)</label><input type="number" value="${actual}" onchange="window._cA=parseFloat(this.value)||0;render()"/></div>
    <div class="field-row"><div class="field"><label class="field-label">Plazo (meses)</label><input type="number" value="${meses}" onchange="window._cMs=parseInt(this.value)||1;render()"/></div><div class="field"><label class="field-label">Rendto. anual (%)</label><input type="number" value="${tasa}" onchange="window._cT=parseFloat(this.value)||0;render()"/></div></div>
  </div>
  <div class="card"><div class="card-title">📊 Escenarios</div>
    <div class="scenario"><div><div style="font-size:13px;font-weight:600;color:#EEF2FF">Optimista</div><div style="font-size:11px;color:#8892B0">${tasa+4}% rendimiento</div></div><div><div class="scenario-val" style="color:#4CAF82">${fmtK(aOpt)}</div><div style="font-size:11px;color:#8892B0;text-align:right">/mes</div></div></div>
    <div class="scenario"><div><div style="font-size:13px;font-weight:600;color:#EEF2FF">Base</div><div style="font-size:11px;color:#8892B0">${tasa}% rendimiento</div></div><div><div class="scenario-val" style="color:#B8963E">${fmtK(aport)}</div><div style="font-size:11px;color:#8892B0;text-align:right">/mes</div></div></div>
    <div class="scenario"><div><div style="font-size:13px;font-weight:600;color:#EEF2FF">Conservador</div><div style="font-size:11px;color:#8892B0">${Math.max(0,tasa-3)}% rendimiento</div></div><div><div class="scenario-val" style="color:#FF9A3C">${fmtK(aCons)}</div><div style="font-size:11px;color:#8892B0;text-align:right">/mes</div></div></div>
    <div class="scenario"><div><div style="font-size:11px;color:#8892B0">Total aportado</div><span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#EEF2FF">${fmtK(aport*meses+actual)}</span></div><div style="text-align:right"><div style="font-size:11px;color:#8892B0">Intereses ganados</div><span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#4CAF82">${fmtK(Math.max(0,meta-(aport*meses+actual)))}</span></div></div>
  </div>
  ${proj.length>0?`<div class="card"><div class="card-title">📈 Proyección del ahorro</div><div class="chart-wrap"><canvas id="calcChart"></canvas></div></div>`:""}`;
}

function onMetodo(v){document.getElementById("tc-sec").style.display=v==="Credito"?"block":"none";}
function onMSI(checked){document.getElementById("msi-sec").classList.toggle("show",checked);if(!checked)document.getElementById("f_msi_n").value=0;}
function selMeses(n){document.querySelectorAll(".meses-btn").forEach(b=>b.classList.remove("sel"));document.getElementById("mb"+n).classList.add("sel");document.getElementById("f_msi_n").value=n;}
function saveGasto(){
  const desc=document.getElementById("f_desc").value,monto=parseFloat(document.getElementById("f_monto").value)||0;
  if(!desc||!monto)return;
  const metodo=document.getElementById("f_metodo").value,esCred=metodo==="Credito";
  const tcId=esCred?parseInt(document.getElementById("f_tc").value)||null:null;
  const esMSI=esCred&&document.getElementById("f_msi").checked;
  const msiN=esMSI?parseInt(document.getElementById("f_msi_n").value)||0:0;
  DATA.gastos.push({id:Date.now(),fecha:document.getElementById("f_fecha").value,desc,categoria:document.getElementById("f_cat").value,monto,metodoPago:metodo,tarjetaId:tcId,esMSI:esMSI&&msiN>0,msiMeses:msiN,msiPagados:0});
  save();closeSheet();render();
}
function delGasto(id){DATA.gastos=DATA.gastos.filter(g=>g.id!==id);save();render();}
function registrarPagoMSI(id){DATA.gastos=DATA.gastos.map(g=>g.id===id?{...g,msiPagados:Math.min(g.msiPagados+1,g.msiMeses)}:g);save();render();}

function addInversion(){openSheet("Nueva Inversión",`<div class="field"><label class="field-label">Tipo</label><select id="f_tipo"><option>ETF</option><option>Accion</option><option>Crypto</option><option>Bono</option><option>Inmueble</option><option>CETES</option><option>Fondo Mutuo</option><option>Otro</option></select></div><div class="field"><label class="field-label">Nombre / Ticker</label><input type="text" id="f_nombre" placeholder="VOO, BTC, CETES..."/></div><div class="field"><label class="field-label">Capital invertido ($)</label><input type="number" id="f_cap" placeholder="0"/></div><div class="field"><label class="field-label">Valor actual ($)</label><input type="number" id="f_val" placeholder="Igual al capital si es nuevo"/></div><div class="field"><label class="field-label">Nivel de riesgo</label><select id="f_riesgo"><option>Bajo</option><option>Medio</option><option>Alto</option><option>Muy Alto</option></select></div><button class="save-btn" style="background:linear-gradient(135deg,#4FC3F7,#1976D2)" onclick="saveInversion()">✓ Agregar al Portafolio</button>`);}
function saveInversion(){const n=document.getElementById("f_nombre").value,c=parseFloat(document.getElementById("f_cap").value)||0;if(!n||!c)return;DATA.inversiones.push({id:Date.now(),tipo:document.getElementById("f_tipo").value,nombre:n,capital:c,valorActual:parseFloat(document.getElementById("f_val").value)||c,riesgo:document.getElementById("f_riesgo").value});save();closeSheet();render();}
function delInversion(id){DATA.inversiones=DATA.inversiones.filter(i=>i.id!==id);save();render();}

function addTarjeta(){openSheet("Nueva Tarjeta",`<div class="field"><label class="field-label">Banco / Nombre</label><input type="text" id="f_banco" placeholder="BBVA Azul, Banamex VISA..."/></div><div class="field"><label class="field-label">Límite de crédito ($)</label><input type="number" id="f_lim" placeholder="0"/></div><div class="field"><label class="field-label">Saldo actual ($)</label><input type="number" id="f_sal" placeholder="0"/></div><div class="field"><label class="field-label">Tasa anual (%)</label><input type="number" id="f_tasa" value="24"/></div><div class="field-row"><div class="field"><label class="field-label">Día corte</label><input type="number" id="f_corte" value="1"/></div><div class="field"><label class="field-label">Día pago</label><input type="number" id="f_pago" value="15"/></div></div><button class="save-btn" style="background:linear-gradient(135deg,#FF9A3C,#E65100)" onclick="saveTarjeta()">✓ Guardar Tarjeta</button>`);}
function saveTarjeta(){const b=document.getElementById("f_banco").value,l=parseFloat(document.getElementById("f_lim").value)||0;if(!b||!l)return;DATA.tarjetas.push({id:Date.now(),banco:b,limite:l,saldo:parseFloat(document.getElementById("f_sal").value)||0,tasaAnual:parseFloat(document.getElementById("f_tasa").value)||24,diaCorte:parseInt(document.getElementById("f_corte").value)||1,diaPago:parseInt(document.getElementById("f_pago").value)||15});save();closeSheet();render();}
function delTarjeta(id){DATA.tarjetas=DATA.tarjetas.filter(t=>t.id!==id);save();render();}

function addDeuda(){openSheet("Registrar Deuda",`<div class="field"><label class="field-label">Tipo</label><select id="f_tipo"><option>Auto</option><option>Personal</option><option>Hipoteca</option><option>Tarjeta</option><option>Estudiantil</option><option>Negocio</option><option>Familia</option><option>Otro</option></select></div><div class="field"><label class="field-label">Acreedor / Institución</label><input type="text" id="f_acr" placeholder="BBVA, INFONAVIT..."/></div><div class="field"><label class="field-label">Monto original ($)</label><input type="number" id="f_orig" placeholder="0"/></div><div class="field"><label class="field-label">Saldo actual ($)</label><input type="number" id="f_sal" placeholder="0"/></div><div class="field"><label class="field-label">Tasa anual (%)</label><input type="number" id="f_tasa" value="15"/></div><div class="field"><label class="field-label">Pago mensual ($)</label><input type="number" id="f_pago" placeholder="0"/></div><button class="save-btn" style="background:linear-gradient(135deg,#F05365,#C62828)" onclick="saveDeuda()">✓ Registrar Deuda</button>`);}
function saveDeuda(){const a=document.getElementById("f_acr").value,s=parseFloat(document.getElementById("f_sal").value)||0;if(!a||!s)return;DATA.deudas.push({id:Date.now(),tipo:document.getElementById("f_tipo").value,acreedor:a,montoOrig:parseFloat(document.getElementById("f_orig").value)||s,saldo:s,tasaAnual:parseFloat(document.getElementById("f_tasa").value)||0,pagoMens:parseFloat(document.getElementById("f_pago").value)||0});save();closeSheet();render();}
function delDeuda(id){DATA.deudas=DATA.deudas.filter(d=>d.id!==id);save();render();}

function addMeta(){openSheet("Nueva Meta Financiera",`<div class="field"><label class="field-label">Nombre de la meta</label><input type="text" id="f_nom" placeholder="Enganche, Viaje, Auto..."/></div><div class="field"><label class="field-label">Monto objetivo ($)</label><input type="number" id="f_obj" placeholder="0"/></div><div class="field"><label class="field-label">Ahorro actual ($)</label><input type="number" id="f_act" placeholder="0"/></div><div class="field"><label class="field-label">Fecha objetivo</label><input type="date" id="f_fecha"/></div><div class="field"><label class="field-label">Prioridad</label><select id="f_prio"><option>Alta</option><option>Media</option><option>Baja</option></select></div><button class="save-btn" style="background:linear-gradient(135deg,#4CAF82,#388E3C)" onclick="saveMeta()">✓ Crear Meta</button>`);}
function saveMeta(){const n=document.getElementById("f_nom").value,o=parseFloat(document.getElementById("f_obj").value)||0;if(!n||!o)return;DATA.metas.push({id:Date.now(),nombre:n,objetivo:o,actual:parseFloat(document.getElementById("f_act").value)||0,fechaObj:document.getElementById("f_fecha").value,prioridad:document.getElementById("f_prio").value});save();closeSheet();render();}
function delMeta(id){DATA.metas=DATA.metas.filter(m=>m.id!==id);save();render();}
function updMeta(id,val){DATA.metas=DATA.metas.map(m=>m.id===id?{...m,actual:parseFloat(val)||0}:m);save();}

// INIT
initNav();render();
if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
